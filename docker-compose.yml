# Local development stack (spec §7). Mirrors the eventual production shape:
# one Dockerfile-based image, multiple services. `worker` and `beat` are
# added in Milestone 3 once there are real Celery tasks to run.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: showadvisor
      POSTGRES_USER: showadvisor
      POSTGRES_PASSWORD: showadvisor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showadvisor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
